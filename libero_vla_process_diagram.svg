<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1080" height="560" fill="#ffffff"/>
  <text x="540" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">
    LIBERO 仿真进程 与 VLA 推理进程通信主循环
  </text>

  <rect x="55" y="82" width="390" height="370" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
  <rect x="635" y="82" width="390" height="370" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>

  <text x="250" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">
    LIBERO 仿真进程
  </text>
  <text x="250" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#2563eb">
    VENV1: libero-env
  </text>

  <text x="830" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">
    VLA 推理进程
  </text>
  <text x="830" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#2563eb">
    VENV2: vla-env
  </text>

  <text x="105" y="205" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#334155">核心职责</text>
  <text x="105" y="240" font-family="Arial, sans-serif" font-size="16" fill="#334155">load_suite()</text>
  <text x="105" y="270" font-family="Arial, sans-serif" font-size="16" fill="#334155">reset_task()</text>
  <text x="105" y="300" font-family="Arial, sans-serif" font-size="16" fill="#334155">step(action)</text>
  <text x="105" y="330" font-family="Arial, sans-serif" font-size="16" fill="#334155">is_success()</text>
  <text x="105" y="360" font-family="Arial, sans-serif" font-size="16" fill="#334155">save_video()</text>

  <text x="685" y="205" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#334155">核心接口</text>
  <text x="685" y="240" font-family="Arial, sans-serif" font-size="16" fill="#334155">health()</text>
  <text x="685" y="270" font-family="Arial, sans-serif" font-size="16" fill="#334155">metadata()</text>
  <text x="685" y="300" font-family="Arial, sans-serif" font-size="16" fill="#334155">reset_episode(task_info)</text>
  <text x="685" y="330" font-family="Arial, sans-serif" font-size="16" fill="#334155">predict_action(obs)</text>

  <line x1="445" y1="190" x2="635" y2="190" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow-gray)"/>
  <rect x="476" y="169" width="128" height="34" rx="17" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="540" y="191" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">health / metadata</text>

  <line x1="445" y1="260" x2="635" y2="260" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <rect x="468" y="226" width="144" height="52" rx="12" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="540" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1d4ed8">observation</text>
  <text x="540" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1d4ed8">images + state + text</text>

  <line x1="635" y1="340" x2="445" y2="340" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <rect x="470" y="309" width="140" height="52" rx="12" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="540" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1d4ed8">action</text>
  <text x="540" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1d4ed8">7D delta + gripper</text>

  <line x1="445" y1="410" x2="635" y2="410" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow-gray)"/>
  <rect x="462" y="389" width="156" height="34" rx="17" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="540" y="411" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">reset_episode(task)</text>

  <text x="540" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">
    主循环：LIBERO 产生 obs → VLA 预测 action → LIBERO 执行动作并判断成功
  </text>
</svg>
