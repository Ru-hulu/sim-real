<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="960" viewBox="0 0 1400 960">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #111827; }
      .subtitle { font-family: Arial, sans-serif; font-size: 15px; font-weight: 500; fill: #64748b; }
      .process-title { font-family: Arial, sans-serif; font-size: 25px; font-weight: 700; fill: #0f172a; }
      .module-title { font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #111827; }
      .label { font-family: Arial, sans-serif; font-size: 15px; font-weight: 700; fill: #334155; }
      .body { font-family: Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #334155; }
      .small { font-family: Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #475569; }
      .arrow-title { font-family: Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #0f172a; }
      .arrow-body { font-family: Arial, sans-serif; font-size: 13px; font-weight: 400; fill: #334155; }
      .mono { font-family: Menlo, Consolas, monospace; font-size: 13px; font-weight: 400; fill: #334155; }
      .mono-small { font-family: Menlo, Consolas, monospace; font-size: 12px; font-weight: 400; fill: #334155; }
    </style>
  </defs>

  <rect width="1400" height="960" fill="#ffffff"/>

  <text x="700" y="46" text-anchor="middle" class="title">LIBERO 仿真进程 与 VLA 推理进程通信图</text>
  <text x="700" y="72" text-anchor="middle" class="subtitle">VLA client 运行在仿真进程内，VLA server 运行在推理进程内；两者通过 HTTP/JSON 交换 observation 与 action</text>

  <!-- Process containers -->
  <rect x="50" y="110" width="520" height="740" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
  <rect x="830" y="110" width="520" height="740" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>

  <text x="310" y="152" text-anchor="middle" class="process-title">仿真进程</text>
  <text x="310" y="178" text-anchor="middle" class="subtitle">run_loop.py / libero-env：推进 LIBERO 环境并发起推理请求</text>

  <text x="1090" y="152" text-anchor="middle" class="process-title">推理进程</text>
  <text x="1090" y="178" text-anchor="middle" class="subtitle">dummy_vla_server.py 或真实 VLA server：接收观测并预测动作</text>

  <!-- Simulation process modules -->
  <rect x="90" y="215" width="440" height="205" rx="10" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="115" y="248" class="module-title">LIBEROSimulationRuntime</text>
  <text x="115" y="276" class="body">• load_suite(suite)：选择 benchmark suite</text>
  <text x="115" y="303" class="body">• reset_task(task_id, episode_id, seed)：重置环境</text>
  <text x="115" y="330" class="body">• get_observation(step)：采集图像、状态、任务文本</text>
  <text x="115" y="357" class="body">• step(action)：把 7 维动作送入 env.step()</text>
  <text x="115" y="384" class="body">• is_success()/is_timeout()/save_video()</text>

  <rect x="90" y="455" width="440" height="250" rx="10" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
  <text x="115" y="488" class="module-title">VLA client：HTTPVLAClient</text>
  <text x="115" y="516" class="body">• check_service_ready() → GET /health</text>
  <text x="115" y="543" class="body">• fetch_model_metadata() → GET /metadata</text>
  <text x="115" y="570" class="body">• reset_model_for_episode(task) → POST /reset_episode</text>
  <text x="115" y="597" class="body">• request_action_prediction(obs) → POST /predict_action</text>
  <text x="115" y="638" class="label">客户端职责</text>
  <text x="115" y="665" class="body">序列化 Observation，发送给 VLA server，</text>
  <text x="115" y="692" class="body">再把返回 payload 解析为 LIBERO Action。</text>

  <!-- Inference process modules -->
  <rect x="870" y="215" width="440" height="220" rx="10" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
  <text x="895" y="248" class="module-title">VLA server：HTTP 服务</text>
  <text x="895" y="276" class="body">• GET /health：返回服务可用状态</text>
  <text x="895" y="303" class="body">• GET /metadata：返回模型输入输出约定</text>
  <text x="895" y="330" class="body">• POST /reset_episode：清空 recurrent state/action cache</text>
  <text x="895" y="357" class="body">• POST /predict_action：接收 observation 并返回 action</text>
  <text x="895" y="398" class="small">dummy server 返回固定动作；真实 server 在这里调用 VLA 模型。</text>

  <rect x="870" y="470" width="440" height="235" rx="10" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="895" y="503" class="module-title">VLA 模型 / 推理逻辑</text>
  <text x="895" y="531" class="body">输入：任务指令、相机图像、机器人状态</text>
  <text x="895" y="558" class="body">处理：图像编码 + 语言理解 + 状态融合 + 动作解码</text>
  <text x="895" y="585" class="body">输出：与 LIBERO 兼容的一步机器人动作</text>
  <text x="895" y="626" class="label">Action 格式</text>
  <text x="895" y="653" class="mono">[dx, dy, dz, droll, dpitch, dyaw, gripper]</text>
  <text x="895" y="680" class="body">共 7 个 float，最后一维控制夹爪开合。</text>

  <!-- Observation arrow -->
  <path d="M 530 330 C 640 330, 760 330, 870 330" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/>
  <rect x="590" y="216" width="220" height="260" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="700" y="246" text-anchor="middle" class="arrow-title">Observation →</text>
  <text x="700" y="272" text-anchor="middle" class="arrow-body">POST /predict_action</text>
  <line x1="610" y1="290" x2="790" y2="290" stroke="#bfdbfe" stroke-width="1"/>
  <text x="610" y="325" class="mono-small">instruction</text>
  <text x="610" y="365" class="mono-small">image:</text>
  <text x="636" y="388" class="small">agentview, wrist</text>
  <text x="610" y="428" class="mono-small">robot_state:</text>
  <text x="636" y="451" class="small">eef pos + axis-angle + gripper qpos</text>

  <!-- Action arrow -->
  <path d="M 870 665 C 760 665, 640 665, 530 665" fill="none" stroke="#059669" stroke-width="4" marker-end="url(#arrow-green)"/>
  <rect x="590" y="588" width="220" height="154" rx="12" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
  <text x="700" y="620" text-anchor="middle" class="arrow-title">← Action</text>
  <text x="700" y="646" text-anchor="middle" class="arrow-body">response of /predict_action</text>
  <line x1="610" y1="665" x2="790" y2="665" stroke="#bbf7d0" stroke-width="1"/>
  <text x="610" y="691" class="mono-small">schema_version</text>
  <text x="610" y="716" class="mono-small">action: 7 floats</text>
  <text x="610" y="736" class="small">仿真进程接收后调用 step(action)</text>

  <!-- Loop footer -->
  <rect x="140" y="890" width="1120" height="44" rx="22" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="700" y="918" text-anchor="middle" class="label">主循环：reset task → 采集 observation → VLA server 推理 action → 仿真 step(action) → 判断 success/timeout → 保存视频</text>
</svg>
